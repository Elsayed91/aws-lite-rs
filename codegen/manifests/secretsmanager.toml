# AWS Secrets Manager manifest — JSON protocol with X-Amz-Target
# Botocore model: secretsmanager/2017-10-17

[api]
name = "secretsmanager"
display_name = "AWS Secrets Manager"
version = "v1"
api_version = "2017-10-17"
service_name = "secretsmanager"
wire_format = "json_target"
rename_all = "PascalCase"
target_prefix = "secretsmanager"
json_version = "1.1"
endpoint_prefix = "secretsmanager"

[api.client]
accessor_name = "secretsmanager"
client_struct = "SecretsmanagerClient"

# === Types ===

[[types]]
shape = "ListSecretsRequest"
include_fields = ["MaxResults", "NextToken", "SortOrder", "SortBy"]

[[types]]
shape = "ListSecretsResponse"
include_fields = ["SecretList", "NextToken"]

[[types]]
shape = "SecretListEntry"
include_fields = ["ARN", "Name", "Description", "RotationEnabled", "RotationRules", "LastRotatedDate", "LastChangedDate", "LastAccessedDate", "CreatedDate", "DeletedDate"]
[types.field_overrides]
ARN = { serde_rename = "ARN" }
LastRotatedDate = { rust_type = "f64" }
LastChangedDate = { rust_type = "f64" }
LastAccessedDate = { rust_type = "f64" }
CreatedDate = { rust_type = "f64" }
DeletedDate = { rust_type = "f64" }

[[types]]
shape = "RotationRulesType"
include_fields = ["AutomaticallyAfterDays", "ScheduleExpression"]

[[types]]
shape = "DeleteSecretRequest"
include_fields = ["SecretId", "RecoveryWindowInDays", "ForceDeleteWithoutRecovery"]
[types.field_overrides]
SecretId = { required = true }

[[types]]
shape = "DeleteSecretResponse"
include_fields = ["ARN", "Name", "DeletionDate"]
[types.field_overrides]
ARN = { serde_rename = "ARN" }
DeletionDate = { rust_type = "f64" }

[[types]]
shape = "RotateSecretRequest"
include_fields = ["SecretId", "RotationLambdaARN", "RotationRules", "RotateImmediately"]
[types.field_overrides]
SecretId = { required = true }
RotationLambdaARN = { serde_rename = "RotationLambdaARN" }

[[types]]
shape = "RotateSecretResponse"
include_fields = ["ARN", "Name", "VersionId"]
[types.field_overrides]
ARN = { serde_rename = "ARN" }

# === Operations ===

[[operations]]
name = "ListSecrets"
rust_name = "list_secrets"
description = "Lists the secrets that are stored by Secrets Manager in the current account and Region."

[[operations]]
name = "DeleteSecret"
rust_name = "delete_secret"
description = "Deletes a secret and all of its versions."

[[operations]]
name = "RotateSecret"
rust_name = "rotate_secret"
description = "Configures and starts the asynchronous process of rotating the secret."
